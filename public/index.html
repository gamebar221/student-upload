<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Upload</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    max-width: 420px;
    width: 100%;
  }
  h2 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 5px;
  }
  p.sub {
    text-align: center;
    color: #777;
    font-size: 14px;
    margin-top: 0;
    margin-bottom: 25px;
  }
  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #333;
    font-size: 14px;
  }
  input[type="text"], input[type="file"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 18px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
  }
  input[type="file"] {
    padding: 8px;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #2c7be5;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1a5fc4; }
  .note {
    font-size: 12px;
    color: #999;
    margin-top: 15px;
    text-align: center;
  }
  #fileCount {
    font-size: 13px;
    color: #2c7be5;
    margin-top: -12px;
    margin-bottom: 15px;
  }
  #loading {
    display: none;
    text-align: center;
    margin-top: 15px;
    color: #2c7be5;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="card">
    <h2>📄 Document Upload</h2>
    <p class="sub">Kindly add Your Name, Roll number & all PDF files</p>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
      <label for="studentName">Full Name</label>
      <input type="text" id="studentName" name="studentName" placeholder="e.g. Ashish Kumar" required>

      <label for="rollNo">Roll Number</label>
      <input type="text" id="rollNo" name="rollNo" placeholder="e.g. 2024CS105" required>

      <label for="files">Select Files (PDF / Images)</label>
      <input type="file" id="files" name="files" multiple required accept=".pdf,.jpg,.jpeg,.png">
      <div id="fileCount"></div>

      <button type="submit">Upload</button>
      <div id="loading">⏳ Uploading, please wait...</div>
    </form>

    <p class="note">Before leaving, please get your documents verified by the administration office</p>
  </div>

  <script>
    const fileInput = document.getElementById('files');
    const fileCount = document.getElementById('fileCount');
    const form = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');

    fileInput.addEventListener('change', () => {
      const count = fileInput.files.length;
      fileCount.textContent = count > 0 ? `${count} file(s) selected` : '';
    });

    form.addEventListener('submit', () => {
      loading.style.display = 'block';
    });
  </script>
</body>
</html>
